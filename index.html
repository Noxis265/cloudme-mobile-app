<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CloudMe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#F6F8FB; --bg-card:#FFFFFF; --bg-input:#FFFFFF;
    --text-primary:#16191D; --text-secondary:#5B6472;
    --accent:#2F80ED; --accent-dark:#1C64D1; --glow:#BFE3FF;
    --success:#2BB673; --danger:#E6484D; --border:#E3E8EF;
    --shadow:0 1px 3px rgba(20,30,40,0.07);
    --radius:16px;
    --font-display:'Fredoka',sans-serif;
    --font-body:'Inter',system-ui,-apple-system,sans-serif;
    --font-mono:'JetBrains Mono',monospace;
    --online:#2BB673;
  }
  [data-theme="dark"] {
    --bg:#0F1117; --bg-card:#1A1D27; --bg-input:#23263A;
    --text-primary:#E8EAED; --text-secondary:#8B95A8;
    --accent:#4D9EFF; --accent-dark:#2F80ED; --glow:#1A3A6B;
    --border:#2A2E3F; --shadow:0 1px 4px rgba(0,0,0,0.4);
    --online:#34D374;
  }
  [data-theme="sunset"] {
    --bg:#2B1B2E; --bg-card:#3B2540; --bg-input:#452B4C;
    --text-primary:#FCEFEF; --text-secondary:#D9A8B5;
    --accent:#FF8A5C; --accent-dark:#E96E3E; --glow:#5A2E3A;
    --border:#4A3050; --shadow:0 1px 4px rgba(0,0,0,0.4);
    --online:#4ADE80;
  }
  [data-theme="forest"] {
    --bg:#0F1F17; --bg-card:#16291F; --bg-input:#1C3326;
    --text-primary:#E6F2EA; --text-secondary:#8FB39E;
    --accent:#34D399; --accent-dark:#10B981; --glow:#143D2C;
    --border:#1F3D2C; --shadow:0 1px 4px rgba(0,0,0,0.4);
    --online:#A3E635;
  }
  [data-theme="ocean"] {
    --bg:#0B1F33; --bg-card:#102A44; --bg-input:#163655;
    --text-primary:#E4F1FB; --text-secondary:#86A9C6;
    --accent:#38BDF8; --accent-dark:#0EA5E9; --glow:#123B5C;
    --border:#1A3B57; --shadow:0 1px 4px rgba(0,0,0,0.4);
    --online:#2DD4BF;
  }
  [data-theme="lavender"] {
    --bg:#F3EEFB; --bg-card:#FFFFFF; --bg-input:#FBF8FF;
    --text-primary:#2E1F45; --text-secondary:#7C6A99;
    --accent:#8B5CF6; --accent-dark:#7C3AED; --glow:#E4D9FB;
    --border:#E1D4F5; --shadow:0 1px 3px rgba(60,30,90,0.08);
    --online:#22C55E;
  }
  *{box-sizing:border-box;transition:background-color .18s,border-color .18s,color .12s;}
  html,body{height:100%;}
  body{margin:0;background:var(--bg);font-family:var(--font-body);color:var(--text-primary);}
  button,input,textarea{font-family:var(--font-body);}
  .app-shell{max-width:1200px;width:100%;margin:0 auto;height:100vh;background:var(--bg);display:flex;flex-direction:column;}
  .view-area{flex:1;min-height:0;display:flex;flex-direction:column;overflow-y:auto;}
  .view-area.no-scroll{overflow:hidden;}
  @media (min-width:761px){.app-shell{border-left:1px solid var(--border);border-right:1px solid var(--border);}}

  /* topbar */
  .topbar{position:sticky;top:0;background:var(--bg);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--border);z-index:5;}
  .logo{font-family:var(--font-display);font-weight:600;font-size:18px;display:flex;align-items:center;gap:5px;flex-shrink:0;}
  .navgroup{display:flex;gap:2px;align-items:center;}
  .navbtn{background:none;border:none;font-weight:600;font-size:12px;color:var(--text-secondary);padding:7px 9px;border-radius:999px;cursor:pointer;white-space:nowrap;}
  .navbtn.active{color:var(--accent);background:rgba(47,128,237,0.12);}
  .navbtn:hover{color:var(--accent);}
  .icon-btn{background:none;border:1px solid var(--border);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);flex-shrink:0;}
  .icon-btn:hover{border-color:var(--accent);}

  /* auth */
  .auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;}
  .auth-card{width:100%;max-width:360px;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:30px 26px;box-shadow:var(--shadow);}
  .auth-hero{text-align:center;margin-bottom:22px;}
  .cloud-glow{width:84px;height:84px;margin:0 auto 10px;border-radius:50%;background:radial-gradient(circle at 50% 38%,var(--glow),transparent 72%);display:flex;align-items:center;justify-content:center;font-size:38px;}
  .auth-hero h1{font-family:var(--font-display);font-weight:600;font-size:22px;margin:0;}
  .auth-hero p{font-size:13px;color:var(--text-secondary);margin:6px 0 0;}
  .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:18px;}
  .auth-tab{flex:1;text-align:center;padding:10px 0;font-weight:600;font-size:14px;color:var(--text-secondary);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;}
  .auth-tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  .field{margin-bottom:14px;display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-mono);}
  .field input,.field textarea{font-size:15px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;outline:none;background:var(--bg-input);color:var(--text-primary);width:100%;}
  .field textarea{resize:none;}
  .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:999px;font-weight:600;font-size:15px;cursor:pointer;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-primary:disabled{opacity:.55;cursor:default;}
  .error-text{color:var(--danger);font-size:13px;margin-bottom:10px;}
  .hint-text{color:var(--text-secondary);font-size:12px;margin-top:14px;text-align:center;line-height:1.5;}

  /* directory */
  .search-bar{padding:12px 18px 4px;}
  .search-bar input{width:100%;padding:10px 14px;border-radius:999px;border:1px solid var(--border);font-size:14px;background:var(--bg-input);color:var(--text-primary);}
  .section-label{font-family:var(--font-mono);font-size:10px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.06em;padding:10px 18px 4px;}
  .directory-list{padding:4px 16px 28px;display:flex;flex-direction:column;gap:10px;}
  .profile-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;gap:14px;align-items:flex-start;box-shadow:var(--shadow);}
  .profile-card.me{border-color:var(--accent);background:rgba(47,128,237,0.06);}
  .avatar-wrap{position:relative;width:54px;height:54px;border-radius:50%;background:radial-gradient(circle at 50% 35%,var(--glow),transparent 75%);display:flex;align-items:center;justify-content:center;font-size:27px;flex-shrink:0;}
  .avatar-wrap.small{width:40px;height:40px;font-size:20px;}
  .avatar-wrap.tiny{width:26px;height:26px;font-size:14px;}
  .online-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;background:var(--online);border:2px solid var(--bg-card);}
  .profile-info{flex:1;min-width:0;}
  .profile-name-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .profile-name{font-weight:600;font-size:15px;}
  .you-tag{font-family:var(--font-mono);font-size:10px;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:1px 5px;}
  .online-tag{font-family:var(--font-mono);font-size:10px;color:var(--online);border:1px solid var(--online);border-radius:6px;padding:1px 5px;}
  .lastseen-tag{font-family:var(--font-mono);font-size:10px;color:var(--text-secondary);border:1px solid var(--border);border-radius:6px;padding:1px 5px;}
  .profile-status{font-size:14px;color:var(--text-primary);margin-top:3px;word-wrap:break-word;white-space:pre-wrap;}
  .profile-status.empty{color:var(--text-secondary);font-style:italic;}
  .write-btn{align-self:center;background:var(--bg-card);border:1px solid var(--border);border-radius:50%;width:38px;height:38px;font-size:16px;cursor:pointer;flex-shrink:0;}
  .write-btn:hover{border-color:var(--accent);}
  .profile-card-actions{display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .friend-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:999px;padding:6px 10px;font-size:12px;font-weight:600;cursor:pointer;color:var(--text-secondary);white-space:nowrap;align-self:center;}
  .friend-btn:hover{border-color:var(--accent);color:var(--accent);}
  .friend-btn.added{background:rgba(46,204,113,0.12);border-color:#2ecc71;color:#2ecc71;}

  /* profile edit */
  .panel{padding:20px 18px 32px;}
  .panel h2{font-family:var(--font-display);font-size:18px;font-weight:600;margin:0 0 16px;}
  .emoji-grid{display:grid;grid-template-columns:repeat(auto-fill,40px);gap:7px;margin-bottom:18px;justify-content:start;}
  .emoji-btn{font-size:18px;width:40px;height:40px;background:var(--bg-input);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .emoji-btn.selected{border-color:var(--accent);background:radial-gradient(circle at 50% 38%,var(--glow),var(--bg-input) 72%);box-shadow:0 0 0 2px rgba(47,128,237,0.18);}
  .char-count{font-size:11px;color:var(--text-secondary);text-align:right;font-family:var(--font-mono);margin-top:4px;}
  .save-msg{font-size:13px;color:var(--success);text-align:center;margin-top:10px;}

  .settings-block{margin-top:28px;padding-top:22px;border-top:1px solid var(--border);}
  .settings-block h3{font-family:var(--font-display);font-size:16px;margin:0 0 14px;}
  .settings-row-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.03em;margin-bottom:8px;}
  .theme-swatches{display:flex;gap:10px;flex-wrap:wrap;}
  .theme-swatch{width:36px;height:36px;border-radius:50%;border:2px solid var(--border);cursor:pointer;color:#fff;font-size:14px;display:flex;align-items:center;justify-content:center;}
  .theme-swatch.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--glow);}
  .privacy-options{display:flex;flex-direction:column;gap:8px;}
  .privacy-option{display:flex;align-items:center;gap:8px;font-size:14px;cursor:pointer;}
  .privacy-option input{width:16px;height:16px;}
  .settings-hint{font-size:12px;color:var(--text-secondary);margin-top:10px;line-height:1.5;}

  /* misc */
  .empty-state,.loading-state{padding:40px 24px;text-align:center;color:var(--text-secondary);font-size:14px;}

  /* chats — dm list */
  .chats-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 4px;}
  .chats-header h2{font-family:var(--font-display);font-size:18px;font-weight:600;margin:0;}
  .dm-list{padding:4px 16px 28px;display:flex;flex-direction:column;gap:8px;}
  .dm-list-item{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;box-shadow:var(--shadow);}
  .dm-list-item:hover{border-color:var(--accent);}
  .dm-list-item.unread{border-left:3px solid var(--accent);}
  .dm-list-info{flex:1;min-width:0;}
  .dm-list-name{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px;}
  .unread-badge{background:var(--accent);color:#fff;border-radius:999px;font-size:10px;font-weight:700;padding:1px 6px;font-family:var(--font-mono);}
  .dm-list-preview{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .dm-list-time{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);flex-shrink:0;}

  /* chat thread */
  .thread-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);}
  .back-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-secondary);padding:4px 8px 4px 0;flex-shrink:0;}
  .thread-title-wrap{flex:1;min-width:0;}
  .thread-name{font-weight:600;font-size:15px;}
  .thread-status{font-size:11px;color:var(--text-secondary);font-family:var(--font-mono);}
  .thread-actions{display:flex;gap:6px;align-items:center;}
  .call-btn-round{background:var(--accent);color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:15px;cursor:pointer;flex-shrink:0;}

  /* search panel */
  .search-panel{background:var(--bg-card);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;}
  .search-panel input{flex:1;padding:8px 12px;border-radius:999px;border:1px solid var(--border);font-size:13px;background:var(--bg-input);color:var(--text-primary);}
  .search-close-btn{background:none;border:none;font-size:16px;cursor:pointer;color:var(--text-secondary);padding:4px;}
  .search-nav{display:flex;gap:4px;align-items:center;}
  .search-nav button{background:none;border:1px solid var(--border);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:12px;color:var(--text-secondary);}
  .search-nav button:hover{border-color:var(--accent);color:var(--accent);}
  .search-count{font-family:var(--font-mono);font-size:11px;color:var(--text-secondary);min-width:40px;text-align:center;}

  /* messages */
  .chat-thread{display:flex;flex-direction:column;flex:1;}
  .messages-list{height:min(55vh,440px);overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:4px;}
  .msg-row{display:flex;gap:8px;align-items:flex-end;max-width:100%;position:relative;}
  .msg-row.me{justify-content:flex-end;}
  .msg-bubble{max-width:74%;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:8px 12px;cursor:pointer;position:relative;}
  .msg-row.me .msg-bubble{background:var(--accent);border-color:var(--accent);color:#fff;}
  .msg-bubble.highlight{box-shadow:0 0 0 2px var(--accent);background:rgba(47,128,237,0.08);}
  .msg-row.me .msg-bubble.highlight{background:var(--accent-dark);}
  .msg-bubble:hover .msg-react-hint{opacity:1;}
  .msg-react-hint{position:absolute;top:-22px;right:4px;background:var(--bg-card);border:1px solid var(--border);border-radius:999px;padding:2px 6px;font-size:11px;color:var(--text-secondary);opacity:0;pointer-events:none;white-space:nowrap;box-shadow:var(--shadow);}
  .msg-sender{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:2px;}
  .msg-text{font-size:14px;white-space:pre-wrap;word-wrap:break-word;}
  .msg-text mark{background:rgba(255,200,0,0.4);border-radius:3px;padding:0 1px;}
  .msg-time{font-family:var(--font-mono);font-size:10px;opacity:.6;margin-top:4px;text-align:right;}
  .msg-reactions{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
  .reaction-pill{display:flex;align-items:center;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:2px 7px;font-size:13px;cursor:pointer;user-select:none;}
  .reaction-pill.mine{border-color:var(--accent);background:rgba(47,128,237,0.1);}
  .reaction-pill .count{font-size:11px;font-family:var(--font-mono);color:var(--text-secondary);}

  /* reaction picker */
  .reaction-picker{position:fixed;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:8px 10px;display:flex;flex-wrap:wrap;gap:4px;max-width:260px;box-shadow:0 4px 20px rgba(0,0,0,0.18);z-index:30;}
  .reaction-picker button{background:none;border:none;font-size:18px;cursor:pointer;border-radius:8px;padding:4px 5px;line-height:1;}
  .reaction-picker button:hover{background:rgba(47,128,237,0.1);}

  .chat-input-bar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border);background:var(--bg);align-items:center;}
  .chat-input-bar input{flex:1;padding:10px 14px;border-radius:999px;border:1px solid var(--border);font-size:14px;background:var(--bg-input);color:var(--text-primary);}
  .send-btn{background:var(--accent);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:16px;cursor:pointer;flex-shrink:0;}
  .attach-btn{background:var(--bg-card);border:1px solid var(--border);border-radius:50%;width:40px;height:40px;font-size:16px;cursor:pointer;flex-shrink:0;color:var(--text-secondary);}
  .attach-btn:hover{border-color:var(--accent);color:var(--accent);}
  .chat-error{color:var(--danger);font-size:12px;padding:0 16px 8px;}

  /* split chats layout (полноэкранный режим) */
  .chats-split{display:flex;flex:1;min-height:0;overflow:hidden;}
  .chats-sidebar{width:320px;flex-shrink:0;border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
  .chats-sidebar-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px;}
  .chats-sidebar-header h2{font-family:var(--font-display);font-size:18px;margin:0;}
  .new-group-btn{background:var(--accent);color:#fff;border:none;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;}
  .chats-main{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
  .chats-placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:14px;text-align:center;padding:20px;}
  @media (max-width:760px){
    .chats-sidebar{width:100%;}
    .chats-main{display:none;}
    .chats-split.thread-open .chats-sidebar{display:none;}
    .chats-split.thread-open .chats-main{display:flex;width:100%;}
  }
  .chat-thread{display:flex;flex-direction:column;flex:1;min-height:0;}
  .messages-list{flex:1;min-height:0;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:4px;}

  /* typing indicator */
  .typing-indicator{font-size:12px;color:var(--accent);font-style:italic;padding:2px 16px 6px;min-height:18px;}

  /* pinned bar */
  .pinned-bar{background:var(--bg-card);border-bottom:1px solid var(--border);padding:8px 14px;font-size:12px;display:flex;align-items:flex-start;gap:8px;}
  .pinned-bar-icon{flex-shrink:0;}
  .pinned-bar-list{display:flex;flex-direction:column;gap:4px;flex:1;min-width:0;}
  .pinned-bar-item{display:flex;align-items:center;gap:6px;cursor:pointer;color:var(--text-secondary);}
  .pinned-bar-item b{color:var(--text-primary);font-weight:600;}
  .pinned-bar-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .pinned-bar-unpin{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:13px;flex-shrink:0;}
  .pinned-bar-unpin:hover{color:var(--danger);}

  /* group list items */
  .dm-list-item{cursor:pointer;}
  .group-tag{font-family:var(--font-mono);font-size:9px;color:var(--text-secondary);border:1px solid var(--border);border-radius:6px;padding:1px 5px;}

  /* attachments */
  .att-image,.att-video{max-width:240px;max-height:280px;border-radius:10px;display:block;margin-top:2px;object-fit:cover;}
  .att-audio{margin-top:4px;width:230px;}
  .att-file{display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.05);border-radius:10px;padding:8px 10px;margin-top:2px;text-decoration:none;color:inherit;}
  .msg-row.me .att-file{background:rgba(255,255,255,0.15);}
  .att-file-icon{font-size:22px;flex-shrink:0;}
  .att-file-info{display:flex;flex-direction:column;min-width:0;flex:1;}
  .att-file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px;}
  .att-file-size{font-size:11px;opacity:.7;font-family:var(--font-mono);}
  .att-file-dl{font-size:16px;flex-shrink:0;}
  .msg-bubble.pinned{box-shadow:0 0 0 2px var(--success);}
  .msg-pin-flag{font-size:10px;color:var(--success);margin-bottom:2px;font-family:var(--font-mono);}

  .msg-reply-quote{border-left:3px solid var(--accent);padding:3px 8px;margin-bottom:5px;font-size:12px;border-radius:4px;background:rgba(0,0,0,0.04);cursor:pointer;display:flex;flex-direction:column;gap:1px;}
  .msg-row.me .msg-reply-quote{background:rgba(255,255,255,0.14);border-left-color:rgba(255,255,255,0.7);}
  .msg-reply-quote b{font-size:11px;}
  .msg-reply-quote span{opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .reply-preview-bar{display:flex;align-items:center;gap:10px;background:var(--bg-card);border-top:1px solid var(--border);padding:8px 14px;font-size:13px;}
  .reply-preview-text{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-secondary);}
  .reply-preview-bar button{background:none;border:none;color:var(--text-secondary);cursor:pointer;font-size:14px;}

  .msg-edit-wrap{display:flex;flex-direction:column;gap:6px;min-width:180px;}
  .msg-edit-input{padding:6px 10px;border-radius:8px;border:1px solid var(--border);font-size:14px;background:var(--bg-input);color:var(--text-primary);width:100%;}
  .msg-edit-actions{display:flex;gap:8px;}
  .msg-edit-actions button{font-size:12px;font-weight:600;border:none;border-radius:999px;padding:4px 10px;cursor:pointer;}
  .msg-edit-actions button[data-action="save-edit-message"]{background:var(--accent);color:#fff;}
  .msg-edit-actions button[data-action="cancel-edit-message"]{background:var(--bg-card);color:var(--text-secondary);border:1px solid var(--border);}

  /* group create panel */
  .member-pick-list{display:flex;flex-direction:column;gap:6px;margin-bottom:18px;max-height:280px;overflow-y:auto;border:1px solid var(--border);border-radius:12px;padding:8px;}
  .member-pick-item{display:flex;align-items:center;gap:10px;padding:6px 8px;border-radius:8px;cursor:pointer;}
  .member-pick-item:hover{background:rgba(47,128,237,0.06);}
  .member-pick-item input{width:16px;height:16px;flex-shrink:0;}
  .member-pick-name{font-size:14px;flex:1;}

  /* call overlay */
  #callOverlayRoot{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(10,14,20,0.65);backdrop-filter:blur(4px);z-index:50;}
  .call-card{background:var(--bg-card);border-radius:20px;padding:28px;width:300px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.3);}
  .call-card.in-call{width:340px;}
  .call-avatar-big{width:70px;height:70px;border-radius:50%;background:radial-gradient(circle at 50% 35%,var(--glow),transparent 75%);display:flex;align-items:center;justify-content:center;font-size:34px;margin:0 auto 12px;}
  .call-title{font-weight:600;font-size:16px;margin-bottom:6px;}
  .call-actions{display:flex;gap:10px;justify-content:center;margin-top:14px;}
  .cbtn{border:none;border-radius:999px;padding:10px 18px;font-weight:600;cursor:pointer;font-size:14px;}
  .cbtn.accept{background:var(--success);color:#fff;}
  .cbtn.decline{background:var(--danger);color:#fff;}
  .cbtn.icon{background:var(--bg-card);border:1px solid var(--border);width:42px;height:42px;padding:0;font-size:18px;}
  .local-only-video{width:100%;border-radius:12px;margin:10px 0;background:#000;max-height:160px;object-fit:cover;}
  .remote-wrap{position:relative;width:100%;height:260px;background:#000;border-radius:14px;overflow:hidden;margin-bottom:8px;}
  .remote-video{width:100%;height:100%;object-fit:cover;}
  .pip-video{position:absolute;bottom:10px;right:10px;width:90px;height:64px;border-radius:8px;object-fit:cover;border:2px solid #fff;background:#000;}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(10px);background:#16191D;color:#fff;padding:10px 18px;border-radius:999px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:60;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}


  /* avatar picker */
  .avatar-picker-section{margin-bottom:18px;}
  .avatar-preview-wrap{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
  .avatar-preview-emoji{width:72px;height:72px;border-radius:50%;background:radial-gradient(circle at 50% 35%,var(--glow),transparent 75%);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;}
  .avatar-preview-img{width:72px;height:72px;border-radius:50%;overflow:hidden;flex-shrink:0;}
  .avatar-preview-img img{width:100%;height:100%;object-fit:cover;}
  .avatar-unsaved-hint{font-size:12px;color:var(--danger);background:rgba(231,76,60,0.08);border:1px solid rgba(231,76,60,0.25);border-radius:8px;padding:7px 10px;margin-bottom:14px;}

  .cropper-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:60;}
  .cropper-panel{background:var(--bg-card);border-radius:18px;padding:22px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 12px 40px rgba(0,0,0,0.3);}
  .cropper-panel h3{margin:0;font-family:var(--font-display);font-size:16px;color:var(--text-primary);}
  .cropper-box{position:relative;border-radius:50%;overflow:hidden;background:#111;cursor:grab;touch-action:none;box-shadow:0 0 0 3px var(--accent);}
  .cropper-box img{position:absolute;user-select:none;pointer-events:none;}
  .cropper-circle-mask{position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 0 9999px rgba(0,0,0,0);pointer-events:none;}
  .cropper-panel input[type="range"]{width:260px;}
  .cropper-actions{display:flex;gap:10px;width:260px;}
  .cropper-actions .btn-primary{flex:1;padding:11px;}
  .cropper-cancel{background:var(--bg-input)!important;color:var(--text-secondary)!important;border:1px solid var(--border);}
  .upload-photo-btn{display:inline-block;background:var(--accent);color:#fff;border-radius:999px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;border:none;}
  .upload-photo-btn:hover{background:var(--accent-dark);}
  .remove-photo-btn{background:none;border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:12px;color:var(--danger);cursor:pointer;}
  .remove-photo-btn:hover{border-color:var(--danger);}
  .emoji-section-label{font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.04em;font-family:var(--font-mono);margin-bottom:8px;}
  @media (prefers-reduced-motion:reduce){*{transition:none !important;}}
</style>
